<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DASHBOARD ZONA INTEGRITAS</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/9/9a/Kementerian_Agama_new_logo.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background-color: #eee;
    }

    .iframe-container {
      width: 100%;
      min-height: 100vh;
      overflow: auto;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100vh; /* tinggi dasar di desktop */
      border: none;
    }

    @media (max-width: 768px) {
      iframe {
        height: 1100px; /* tinggi fix untuk HP */
      }
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbx9jOhlOeoGUkzj9oXYVbkrtWWE6-lobkubXJE0FWSf1Haf5BGJJp6cFI2oivEqGu7-NA/exec"
      scrolling="yes">
    </iframe>
  </div>
</body>
</html>
